name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Create tag from release.json
        run: |
          TAG=$(python - <<'PY'
          import json
          with open("release.json", "r", encoding="utf-8") as fh:
              state = json.load(fh)
          release_state = state.get("state")
          channel = state.get("channel")
          base_version = state.get("baseVersion")
          counter = int(state.get("counter") or 0)
          released_version = state.get("releasedVersion") or base_version
          if release_state == "released":
              print(f"v{released_version}")
          elif release_state == "in-progress" and channel in {"alpha", "beta", "rc"} and counter > 0:
              print(f"v{base_version}-{channel}.{counter}")
          PY
          )
          if [ -z "$TAG" ]; then
            echo "No release tag to create"
            exit 0
          fi
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
