name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Create tag from version.json
        run: |
          STATE=$(python - <<'PY'
import json
with open("version.json", "r", encoding="utf-8") as fh:
    state = json.load(fh)
print(state["state"])
PY
)
          if [ "$STATE" != "released" ]; then
            echo "No release tag to create"
            exit 0
          fi
          VERSION=$(python - <<'PY'
import json
with open("version.json", "r", encoding="utf-8") as fh:
    state = json.load(fh)
print(state["releasedVersion"] or state["baseVersion"])
PY
)
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
